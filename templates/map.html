{% extends 'base.html' %}
{% block title %}Map View - FoodShare{% endblock %}

{% block extra_css %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
    #map {
        height: 600px;
        width: 100%;
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-md);
    }
</style>
{% endblock %}

{% block content %}
<div class="container" style="padding: 1.5rem 2.5rem; margin-bottom: 2rem;">
    <h1 class="heading" style="margin-bottom: 0.25rem;">Food Map</h1>
    <p style="color: var(--text-muted);">View all available food donations near you on the map.</p>
</div>

<div id="map" style="margin-bottom: 3rem;"></div>

{% endblock %}

{% block extra_js %}
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Initialize map centered roughly on a default location (can use browser geolocation too)
        var map = L.map('map').setView([40.7128, -74.0060], 12); // Default to NY coordinates

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Try HTML5 geolocation
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                map.setView([lat, lng], 13);

                L.marker([lat, lng]).addTo(map)
                    .bindPopup('<b>You are here</b>').openPopup();
            });
        }

        // Data from server
        var donations = {{ donations_json| safe
    }};

    donations.forEach(function (don) {
        if (don.latitude && don.longitude) {
            var popupContent = `
                    <div style="min-width: 200px;">
                        <h4 style="margin: 0 0 5px 0;">${don.food_name}</h4>
                        <p style="margin: 0 0 5px 0;"><b>Qty:</b> ${don.quantity}</p>
                        <p style="margin: 0 0 5px 0;"><b>Location:</b> ${don.location}</p>
                        <p style="color: #e74c3c; margin: 0 0 10px 0;"><b>Expires:</b> ${don.expiry_time}</p>
                        ${don.role === 'ngo' ? `<a href="/ngo/accept/${don.id}/" class="btn btn-primary" style="display: block; padding: 5px; text-align: center; color: white; text-decoration: none; border-radius: 4px;">Accept Delivery</a>` : ''}
                        ${don.role === 'needy' ? `<a href="/needy/request/${don.id}/" class="btn btn-primary" style="display: block; padding: 5px; text-align: center; color: white; text-decoration: none; border-radius: 4px;">Request Food</a>` : ''}
                    </div>
                `;
            L.marker([don.latitude, don.longitude]).addTo(map)
                .bindPopup(popupContent);
        }
    });
    });
</script>
{% endblock %}
